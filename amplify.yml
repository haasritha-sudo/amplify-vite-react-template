version: 1

backend:
  phases:
    build:
      commands:
        # Install dependencies in a non-strict way (required for Amplify + AWS SDK)
        - npm install --legacy-peer-deps

frontend:
  phases:
    preBuild:
      commands:
        # Same install strategy for frontend
        - npm install --legacy-peer-deps
    build:
      commands:
        # Build Vite app
        - npm run build

  artifacts:
    # Vite output directory
    baseDirectory: dist
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*